mission:
  id: als_multi_domain_search_track_encircle_v1
  objective: >
    Detect, track, and contain a moving target across a coastal-littoral zone
    using coordinated air, land, and sea assets.
  success_criteria:
    - target_detected
    - track_stable_for_30s
    - encirclement_established
  abort_conditions:
    - operator_abort
    - fleet_battery_below_threshold
    - target_lost_for_60s

# --------------------------------------------------------
# FLEET (roles + domains; behaviors are hints, not bindings)
# --------------------------------------------------------
fleet:
  # AIR
  - id: uav_1
    domain: air
    platform_type: quadrotor
    role: scout
    group: air_alpha

  - id: uav_2
    domain: air
    platform_type: quadrotor
    role: scout
    group: air_alpha

  - id: uav_3
    domain: air
    platform_type: quadrotor
    role: tracker
    group: air_beta

  - id: uav_4
    domain: air
    platform_type: fixed_wing
    role: overwatch
    group: air_beta

  - id: uav_5
    domain: air
    platform_type: quadrotor
    role: interceptor
    group: air_gamma

  # LAND
  - id: ugv_1
    domain: land
    platform_type: ugv
    role: scout
    group: land_alpha

  - id: ugv_2
    domain: land
    platform_type: ugv
    role: interceptor
    group: land_beta

  # SEA
  - id: usv_1
    domain: sea
    platform_type: usv
    role: tracker
    group: sea_alpha

  - id: usv_2
    domain: sea
    platform_type: usv
    role: interceptor
    group: sea_beta

# --------------------------------------------------------
# ENVIRONMENT (drives inference: sensor modes, spacing, policies)
# --------------------------------------------------------
environment:
  type: littoral_coastal
  time_of_day: night
  visibility: degraded
  weather: light_rain
  sea_state: moderate

  geofence:
    polygon_id: sector_alpha_boundary

  restricted_zones:
    - harbor_lane
    - marina_exclusion

# --------------------------------------------------------
# TASK GRAPH (high-level phases; planner expands/assigns)
# --------------------------------------------------------
tasks:
  - id: ingress
    type: go_to_area
    assigned_to:
      - uav_1
      - uav_2
      - ugv_1
      - usv_1
    params:
      area_id: sector_alpha

  - id: wide_search
    type: search
    assigned_to:
      - uav_1
      - uav_2
      - ugv_1
    params:
      area_id: sector_alpha
    success_when:
      - target_detected

  - id: confirm_overwatch
    type: patrol
    assigned_to:
      - uav_4
    params:
      area_id: sector_alpha
      pattern: racetrack

  - id: track_primary
    type: track
    assigned_to:
      - uav_3
      - usv_1
    success_when:
      - track_stable
afety">
  <Sequence>
    <BatteryOK vehicle_id="{vehicle_id}" min_battery_pct="{min_battery_pct}"/>
    <WithinGeofence vehicle_id="{vehicle_id}" geofence_id="{geofence_id}"/>
    <OutsideRestrictedZone vehicle_id="{vehicle_id}" restricted_zone_list="{restricted_zone_list}"/>
  </Sequence>
</BehaviorTree>

<BehaviorTree ID="UAV_Search">
  <Sequence>
    <SubTree ID="CommonSafety" vehicle_id="uav_1" min_battery_pct="20.0" geofence_id="{geofence_id}" restricted_zone_list="{restricted_zone_list}"/>
    <Timeout msec="60000">
      <GoToArea vehicle_id="uav_1" area_id="{mission_area}"/>
    </Timeout>
    <RetryUntilSuccessful num_attempts="2">
      <Timeout msec="150000">
        <SearchArea vehicle_id="uav_1" area_id="{mission_area}" pattern="lawnmower" sensor_mode="thermal"/>
      </Timeout>
    </RetryUntilSuccessful>
    <TargetDetected source_vehicle="uav_1" target_id="{target_id}"/>
  </Sequence>
</BehaviorTree>

<BehaviorTree ID="USV_Track">
  <Sequence>
    <SubTree ID="CommonSafety" vehicle_id="uav_3" min_battery_pct="20.0" geofence_id="{geofence_id}" restricted_zone_list="{restricted_zone_list}"/>
    <Timeout msec="30000">
      <HandoffTarget vehicle_id="uav_3" target_id="{target_id}"/>
    </Timeout>
    <TargetAssigned vehicle_id="uav_3" target_id="{target_id}"/>
    <Timeout msec="90000">
      <TrackTarget vehicle_id="uav_3" target_id="{target_id}"/>
    </Timeout>
    <TrackStable vehicle_id="uav_3" target_id="{target_id}"/>
  </Sequence>
</BehaviorTree>

<BehaviorTree ID="Joint_Encircle">
  <Timeout msec="6
  - id: handoff_to_interceptors
    type: handoff_target
    assigned_to:
      - usv_1

  - id: intercept_and_contain
    type: encircle
    assigned_to:
      - uav_5
      - ugv_2
      - usv_2
    params:
      radius_m: 18.0
      standoff_m: 10.0

  - id: return_home
    type: return_home
    assigned_to:
      - uav_1
      - uav_2
      - uav_3
      - uav_4
      - uav_5
      - ugv_1
      - ugv_2
      - usv_1
      - usv_2

# --------------------------------------------------------
# CONSTRAINTS (hard/soft; drive safety subtree + policies)
# --------------------------------------------------------
constraints:
  hard:
    min_battery_abort_pct: 20.0
    geofence_policy: must_stay_inside
    collision_avoidance: required
    min_inter_vehicle_separation_m: 6.0

  soft:
    priority: safety        # influences root control (ReactiveFallback)
    comms_preference: maintain_mesh
    stealth_preference: low

# --------------------------------------------------------
# TUNING (execution knobs; planner maps to decorators)
# --------------------------------------------------------
tuning:
  tick_hz: 10
  retry_count: 2

  timeout_s:
    go_to_area: 60
    search: 150
    patrol: 120
    track: 90
    handoff_target: 30
    encircle: 60

# --------------------------------------------------------
# PREFERENCES (hints for agentic planner)
# --------------------------------------------------------
preferences:
  search_style: coverage            # coverage | frontier | perimeter
  formation:
    air: loose_swarm
    land: corridor
    sea: line_abreast
  coordination:
    handoff_mode: producer_consumer
    encircle_strategy: multi_domain_closure