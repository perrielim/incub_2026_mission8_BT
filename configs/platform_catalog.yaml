platforms:

  quadrotor:
    domain: air

    capabilities:
      navigation: true
      exploration: true
      tracking: true
      encirclement: true
      coordination: true
      handoff_target: true
      recovery_land: true

    sensors:
      rgb:
        enabled: true
      thermal:
        enabled: true
      lidar:
        enabled: false
      radar:
        enabled: false
      gps:
        enabled: true
      imu:
        enabled: true

    defaults:
      sensor_mode:
        day: rgb
        night: thermal
      search_pattern: lawnmower
      mode: OFFBOARD
      takeoff_altitude_m: 30.0
      min_battery_abort_pct: 20.0
      home_pose: home_uav
      encircle_radius_m: 18.0
      encircle_standoff_m: 10.0
      exploration_status: searching

    limits:
      max_speed_mps: 12.0
      min_safe_separation_m: 10.0
      max_operating_altitude_m: 120.0

    bt_nodes:
      mission:
        - mission_GetPolygonCentroid
        - mission_LLAToPose
        - mission_OverridePoseAltitude
        - mission_PointToPoseStamped
        - mission_SetAgentTask
        - mission_SetTeamTask
        - mission_IsAgentInArea
        - mission_IsAgentTask

      mavros:
        - mavros_CommandArm
        - mavros_CommandLand
        - mavros_CommandTakeOff
        - mavros_SetHome
        - mavros_SetMode
        - mavros_SetPointLocal
        - mavros_BatteryOK
        - mavros_StateOK

      navigation:
        - navigation_NavigateToPose

      exploration:
        - exploration_AssignPartitions
        - exploration_DeconflictAssignments
        - exploration_FindIngressPoint
        - exploration_GetAgentAssignedPartitionId
        - exploration_GetPartitionPolygon
        - exploration_GetSearchArea
        - exploration_PartitionSearchArea
        - exploration_PlanNextViewpoint
        - exploration_SetAgentExplorationStatus
        - exploration_SetPartitionAssignments
        - exploration_SetPartitionCompletion
        - exploration_SetPartitions
        - exploration_IsAllPartitionsComplete
        - exploration_IsPartitionComplete
        - exploration_IsPartitionSet

      engagement:
        - TargetDetected
        - HandoffTarget
        - TargetAssigned
        - TrackTarget
        - TrackStable
        - EncircleTarget

    node_defaults:
      mavros_CommandTakeOff:
        altitude: 30.0

      mavros_SetMode:
        mode: OFFBOARD

      mavros_BatteryOK:
        min_battery_pct: 20.0

      mission_SetAgentTask:
        task: search

      exploration_SetAgentExplorationStatus:
        status: searching

      navigation_NavigateToPose:
        pose: "{goal_pose}"

      TargetDetected:
        source_vehicle: "{agent_id}"

      TrackTarget:
        vehicle_id: "{agent_id}"
        target_id: "{target_id}"

      EncircleTarget:
        vehicle_id: "{agent_id}"
        target_id: "{target_id}"
        radius_m: 18.0
        standoff_m: 10.0


  fixed_wing:
