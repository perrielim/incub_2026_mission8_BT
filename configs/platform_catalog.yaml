      mavros:
        - mavros_SetHome
        - mavros_SetMode
        - mavros_SetPointLocal
        - mavros_BatteryOK
        - mavros_StateOK

      navigation:
        - navigation_NavigateToPose

      exploration:
        - exploration_FindIngressPoint
        - exploration_GetSearchArea
        - exploration_GetPartitionPolygon
        - exploration_PlanNextViewpoint
        - exploration_SetAgentExplorationStatus

      engagement:
        - TargetDetected
        - HandoffTarget
        - TargetAssigned
        - TrackTarget
        - TrackStable

    node_defaults:
      mavros_SetMode:
        mode: AUTO

      mavros_BatteryOK:
        min_battery_pct: 25.0

      mission_SetAgentTask:
        task: overwatch

      exploration_SetAgentExplorationStatus:
        status: searching

      TargetDetected:
