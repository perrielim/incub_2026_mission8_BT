mission_id: als_multi_domain_search_track_encircle_v1
root:
  control: ReactiveFallback
blackboard:
  mission_area: sector_alpha
  target_id: ''
  geofence_id: sector_alpha_boundary
  restricted_zone_list:
  - harbor_lane
  - marina_exclusion
defaults:
  retry_count: 2
  tick_hz: 10
vehicles:
  uav_1:
    domain: air
    platform_type: quadrotor
    role: scout
    sensor_mode: thermal
    min_battery_pct: 20.0
    supported_actions: &id001
    - Idle
    - GoToArea
    - SearchArea
    - DetectTarget
    - TrackTarget
    - EncircleTarget
    - ReturnHome
    search_pattern: lawnmower
  uav_2:
    domain: air
    platform_type: quadrotor
    role: scout
    sensor_mode: thermal
    min_battery_pct: 20.0
    supported_actions: *id001
    search_pattern: lawnmower
  uav_3:
    domain: air
    platform_type: quadrotor
    role: tracker
    sensor_mode: thermal
    min_battery_pct: 20.0
    supported_actions: *id001
    search_pattern: lawnmower
  uav_4:
    domain: air
    platform_type: fixed_wing
    role: overwatch
    sensor_mode: thermal
    min_battery_pct: 25.0
    supported_actions:
    - Idle
    - GoToArea
    - SearchArea
    - DetectTarget
    - TrackTarget
    - ReturnHome
    search_pattern: racetrack
  uav_5:
    domain: air
    platform_type: quadrotor
    role: interceptor
    sensor_mode: thermal
    min_battery_pct: 20.0
    supported_actions: *id001
    search_pattern: lawnmower
  ugv_1:
    domain: land
    platform_type: ugv
    role: scout
    sensor_mode: lidar_thermal
    min_battery_pct: 20.0
    supported_actions: &id002
    - Idle
    - GoToArea
    - SearchArea
    - DetectTarget
    - TrackTarget
    - EncircleTarget
    - ReturnHome
    search_pattern: corridor_sweep
  ugv_2:
    domain: land
    platform_type: ugv
    role: interceptor
    sensor_mode: lidar_thermal
    min_battery_pct: 20.0
    supported_actions: *id002
    search_pattern: corridor_sweep
  usv_1:
    domain: sea
    platform_type: usv
    role: tracker
    sensor_mode: radar_thermal
    min_battery_pct: 20.0
    supported_actions: &id003
    - Idle
    - GoToArea
    - HandoffTarget
    - TrackTarget
    - EncircleTarget
    - ReturnHome
    search_pattern: sector_scan
  usv_2:
    domain: sea
    platform_type: usv
    role: interceptor
    sensor_mode: radar_thermal
    min_battery_pct: 20.0
    supported_actions: *id003
    search_pattern: sector_scan
timeouts_ms:
  go_to_area: 60000
  search: 150000
  patrol: 120000
  track: 90000
  handoff_target: 30000
  encircle: 60000
subtree_templates:
  CommonSafety:
    control: Sequence
    nodes:
    - type: Condition
      id: BatteryOK
      ports:
        vehicle_id: '{vehicle_id}'
        min_battery_pct: '{min_battery_pct}'
    - type: Condition
      id: WithinGeofence
      ports:
        vehicle_id: '{vehicle_id}'
        geofence_id: '{geofence_id}'
    - type: Condition
      id: OutsideRestrictedZone
      ports:
        vehicle_id: '{vehicle_id}'
        restricted_zone_list: '{restricted_zone_list}'
phases:
- id: UAV_Search
  control: Sequence
  dependencies: []
  assigned_agents:
  - uav_1
  nodes:
  - type: SubTree
    id: CommonSafety
    bind:
      vehicle_id: uav_1
      min_battery_pct: 20.0
      geofence_id: '{geofence_id}'
      restricted_zone_list: '{restricted_zone_list}'
  - type: Decorator
    id: Timeout
    params:
      msec: 60000
    child:
      type: Action
      id: GoToArea
      ports:
        vehicle_id: uav_1
        area_id: '{mission_area}'
  - type: Decorator
    id: RetryUntilSuccessful
    params:
      num_attempts: 2
    child:
      type: Decorator
      id: Timeout
      params:
        msec: 150000
      child:
        type: Action
        id: SearchArea
        ports:
          vehicle_id: uav_1
          area_id: '{mission_area}'
          pattern: lawnmower
          sensor_mode: thermal
  - type: Condition
    id: TargetDetected
    ports:
      source_vehicle: uav_1
      target_id: '{target_id}'
- id: USV_Track
  control: Sequence
  dependencies:
  - UAV_Search
  assigned_agents:
  - uav_3
  nodes:
  - type: SubTree
    id: CommonSafety
    bind:
      vehicle_id: uav_3
      min_battery_pct: 20.0
      geofence_id: '{geofence_id}'
      restricted_zone_list: '{restricted_zone_list}'
  - type: Decorator
    id: Timeout
    params:
      msec: 30000
    child:
      type: Action
      id: HandoffTarget
      ports:
        vehicle_id: uav_3
        target_id: '{target_id}'
  - type: Condition
    id: TargetAssigned
    ports:
      vehicle_id: uav_3
      target_id: '{target_id}'
  - type: Decorator
    id: Timeout
    params:
      msec: 90000
    child:
      type: Action
      id: TrackTarget
      ports:
        vehicle_id: uav_3
        target_id: '{target_id}'
  - type: Condition
    id: TrackStable
    ports:
      vehicle_id: uav_3
      target_id: '{target_id}'
- id: Joint_Encircle
  control: Parallel
  dependencies:
  - USV_Track
  assigned_agents:
  - uav_5
  - ugv_2
  - usv_2
  timeout_msec: 60000
  success_count: 3
  failure_count: 1
  nodes:
  - type: Action
    id: EncircleTarget
    ports:
      vehicle_id: uav_5
      target_id: '{target_id}'
      radius_m: 18.0
      standoff_m: 10.0
  - type: Action
    id: EncircleTarget
    ports:
      vehicle_id: ugv_2
      target_id: '{target_id}'
      radius_m: 18.0
      standoff_m: 10.0
  - type: Action
    id: EncircleTarget
    ports:
      vehicle_id: usv_2
      target_id: '{target_id}'
      radius_m: 18.0
      standoff_m: 10.0
recovery:
  enabled: true
  control: Sequence
  mode: return_home_all
  nodes:
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: uav_1
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: uav_2
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: uav_3
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: uav_4
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: uav_5
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: ugv_1
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: ugv_2
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: usv_1
  - type: Action
    id: ReturnHome
    ports:
      vehicle_id: usv_2
